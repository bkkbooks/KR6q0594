front:
  text: 鑑堂和尚語録序鑑上人者童年祝髮苦志宗傳啓當業之鼓鐘津梁龍象闡治平之棒喝印證薪燈滿布黃金兩建祇園之盛群薦白足還經耆臘之年別所稱申流砥柱末代津梁者也豫曾入白社之交夙聆青州之論觸處皆成妙諦磕著便是針鋒雖未盡識微機抑亦略覲大意涅槃數載法嗣多人輯其語言文字將欲壽諸梨棗紀夫功德訓誨諄屬辨以秕糠此固浮屠報本之心實浹塵外契投之意上堂法語足徵當下鉗錘示衆小參尤見性天訣竅抹清風披明月詠歌無意總文章聚頑石散天花偈頌忘機皆縱奪自慚門外漢難通五覺淵微應有個中人推作三乘法棟康熙戊子閏三月屏山杜允貞子醇氏撰鑑堂一禪師語録目次序上堂秉拂示衆小參佛事偈頌
