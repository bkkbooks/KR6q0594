body:
  text: 嗣法參學門人明滿慧等録住常樂禪寺康熙三十五年佛誕師受忠州合郡文武官宰紳襟四衆等請開堂拈啓云銀箋洛陽貴管城翰墨香維那試宣出無用再思量宣畢喝一喝云寶座軒昂威風凜冽踏過報化佛頭一任諸人捫摸遂升座拈香云此瓣香枝培界海葉蔭索訶爇向爐中奉祝當今皇帝萬歲萬萬歲皇后齊年太子千秋伏願萬方樂利人人快睹堯天四海歡騰箇箇欣瞻舜日此瓣香肱股聯芳鳳麟班濟爇向爐中敬為滿朝文武合國公卿本郡宰官紳襟檀越伏願誠通帝座光映祇林常為覺海金湯永作擎天柱礎此瓣香播植威音前覆育空劫外爇向爐中供養傳臨濟正宗第二十七代上竺下峰本師老和尚用酬法乳更冀薪傳二桂派衍五花斂衣就座上首白椎云法筵龍象衆當觀第一義師豎拄杖云倩取柳溪竹一莖絲綸不挂釣金鱗就中若有金牙客劈筈奪窩任縱擒問答畢乃云光臨泉石意殷勤點染溪山色更新一雨灑花瓊玉潤九龍吐水紫金瀠皇圖鞏固佛日長明淨瓶灼發寶鼎氤氳嚙𡄦𭊘𡄦杜魯𡄦這些且置因齋慶讚又作麼生良久云山河社稷周天永蘭桂祇林遍地森再結椎師下座檀信建會請上堂嶺畔杜鵑啼嵒前石虎嘶暮雲飛梵閣宿鳥向林棲泥牛銜月走木馬步霞歸毗盧光現瑞祕咒義難思山僧今到來逐段為設施且道有何設施法法本來空鳴鴉代曉鐘梵音傳谷響火焰覓魚蹤卓拄杖云這回不作槐安夢北斗藏身萬彙空檀信追親請上堂紅霞散彩日輪西誰不還家覓宿時八面玲瓏華藏海九重深密步雲梯地搖六震乾元淨天雨四花坤厚持無底籃中多寶聚滿盆甘露滑如飴既爾恁麼則一會若冤若親箇箇悉皆超度去也良久喝一喝云日臨滄海千般慶月挂須彌萬彙輝創建優曇禪院上堂卜得祇林建此基梵宮湧出與天齊池成月現光飛焰閣拱星攢影燦輝拄杖口開施法乳芒鞋舌吐露玄機這回撲碎莊周夢穩棹鐵航任所之復以拄杖卓三卓云千年常住常常住億代永傳永永傳檀信薦亡請上堂紫霧煙籠直指西南疏星淡月影映前川高懸赤幟冥陽生喜展演金鎞斗柄增寒慣拈無底鉢解弄沒絲絃等間大步長安道任運優遊越覺天喝一喝云雷震群靈醒雨潤百花鮮上元振宗表圓鐘會老人命秉拂這段因緣將錯就錯偶接慈旨直下擔荷且擔荷一句又作麼生道嫩柳堤邊一線通桑榆且喜向春溶翠屏影映江環秀浯水鱗遊意樂從擔不盡荷難窮聊將麈尾拂春風時節因緣隨分適月影闌干應曉鐘茲因堂頭老人命為合郡文武官宰紳襟四衆等表揚勝會慶賀帝誕諸仁者還識這段因緣麼良久云寒梅花放鳥聲樂曉夜鐘鳴客夢醒示衆示衆學在我後為弟智從師生為子故教有匠成之德學有資秉之能所謂學問誠弟子之業講解實師長之任也今則不然下無一言以問辨上卻百法而提攜尤自方圓不合長短參差吾因是扼腕深惜蹙額長噓試問就中還有息得這口氣者麼乃顧視左右云覺自覺他唯我覺知音知後復誰知示衆四十年前寶光院中稟俱于師翁座下深蒙稟習戒定圓明四十年後治平堂裡荷法于本師杖頭每受提持鉗錘毒辣即今前後不涉定慧無拘遇間時則迎賓送客逢飢寒乃喫飯穿衣管甚麼麻斤矢橛休牽惹趙犬楊驢一味灑灑脫脫萬般散散疏疏可恨兒郎沒見識預先偷我兩聯詩建華嚴會示衆舉古德云德雲常在妙高峰行繞峰頭不見蹤七日既然尋不見一朝何故卻相逢六千乞士十心滿五百高人一信通回首夕陽坡下望白雲青嶂萬千重試問諸仁者這箇境界與華嚴性海同乎異耶若謂同龜哥眼裡鼓樵桐若云別蝸牛角上眼冰雪不同不別一句又作麼生處處總成華藏界堂堂無處不毗盧開山示衆豎剎巍巍接太虛天臺方廣視偏低因緣會遇人天慶縱奪當場祖佛師運用臨機掃蹤迹尋常揮麈絶狐疑從今不搆時腔套解下郎當無垢衣喝一喝云布髮揮金皆我助當方土地是誰司小參瑞林檀越對靈小參花滿春山幽梁燕語聲寂露滴偶驚顏風拂豫懷戚數載弘護殷別去復何急山僧今到來試問這消息且道那裡是真消息以手畫云藹藹瑞蘭恆暢茂枝枝嫩桂滿庭芳吾今直示真歸路彈指迥然超樂邦對靈小參一張故紙孰主張四面江霞映緑窗謬果瞞因長劫苦合塵背覺受悽惶啾嗟野外空浩歎臥草霜間徒慘傷撫案一下云咦輕擊鉗錘休錯過這回端的睹慈光佛事野雲老和尚起龕這慈顏髮白鬚白治平多年擎魔捉賊來時菊芳新去日光皎潔且道即今臨行一句又作麼生以手畫云拄杖流輝東閣頭芒鞋踏遍西江月入塔松青竹翠六出飄張地脈靈通山悠水長龍窩獅窟麟舞鳳翔至止于斯左右吉祥瑞雲覆護紫霧流芳乃舉瓶入塔云宴坐後又作麼生滿架星辰光太極兩輪日月映中央應三九提攜數載別草七期月圓月缺且悲且離嚴霜凜冽薤露沾衣愧無陳獻採藻採芝聊供香容若存若遺且道畢竟有何存遺爇香云常寂光中頻點首獅兒遍界等須彌體如和尚入塔雲飛東嶺復還西月挂松梢影落池撫掌林間親色笑兔兒不在舊窩底和尚既歸祖室圓寂因甚道不在舊窩乃捧瓶入塔云翠屏有意花開早緑竹無心應遠垂勝泉禪人舉火恁麼來恁麼去一點靈光含真氣去來莫作等間看山僧示汝本公據以火炬畫云烈焰層層入太清紅蓮灼灼無遮蔽見初大德封龕昨日歌兮今日泣悲歡離合總歸一從教面目又新新暫下簾籠深護密且道如何密護乃指龕云胸中縱藏千丈冰切莫逢人露一滴起龕玉露垂珠映夕陽梅花枝上吐清香年寒歲暮客難免踏雪歸兮胡太忙既然如是大德即今行腳去乃引龕云芒鞋踢碎山頭玉拄杖挑開海底金舉火縹眇煙雲繞翠屏靈根好向紅爐生這回鍛出金剛眼歸去來兮變假真作麼得變真假去攛下火炬云笑指南來客在在屬丙丁收骨只這些子含藏劫外暫借暫停無隔無礙直至而今穩持穩載作麼得以穩載去投骨入瓶云時時靜聽獅兒吼在在安養從心快安位有像原無像真空未盡空恬然趺膝坐休于紙上逢畢竟又向甚麼處相逢聻插香云爐煙馨馥馥嫩桂藹蓁蓁入塔蘭箭香梅萼白協吉牛眠應地脈左龍窩右象穴中有一座更奇特是何奇特乃捧瓶入云青山恆作伴明月永為燈性心尼下火金風飄梧葉玉露點蒼苔本性原無住幻化安排心大德還知麼質賦坤形體服緇衣億千繫念百八輪持即今四大非有五蘊皆空這些又向甚麼處安著攛火炬云蓮花國裡香浮水凡聖爐中火煉金真敬沙彌起龕住來三載別去一朝悲歡離合無動無搖敬沙彌還識無動搖處麼乃以手引龕云行人別新道歸燕理舊巢下火蘆花飛白菊蕊舒金侍我巾瓶勞力勞心即今恁麼去山僧又向何處呼喚汝攛火炬云乘茲煙雲去觀世得無生起骨三日前起居食宿三日後鍛成金粟仔細看來盡幻身惟有山青水長緑敬沙彌要會山青水緑麼以骨投瓶云一番掉換一番新管得無拘何所束入塔層巒疊峙兮山環委蛇旋繞兮水曲四大匪堅兮幻化無去無來兮露布雖然如是吾建此窣堵惟恨汝先豫一籌那裡是占先處喝一喝云床窄宜先臥粥稀顧後稠熊門韓太君對靈緣樹陰濃紅蓮燦爛東土結正果西乾綻優曇攸焉玉山摧且喜金甌湛木人傷悼血淚揮石女垂悲拈香奠拈香奠勢至親接引文殊攜彼岸且道韓太君素性溫良善心忠正欽崇四德比孟母之再來德備十全乘涅槃而歸去太君既識歸去來又向甚麼處安身立命拈香云輕駕鐵船遊大海誠為不怕浪頭高為省念尼起龕他方異地異地他方縱橫無礙舉步覺場腳跟著地月映中央且道省念尼腳跟著地又作麼生以手打圓云來時徒看千江月去後依舊一輪升舉火月白風輕天清地寧爐火熾盛鐵到成金把火炬打圓相云一絲不挂三冬暖兩火成炎六月寒收靈骨疏雨潤芙蓉西風搖翠柏冷露滴金懷蘆花沙岸白昨日主今朝客看來總是無心得執骨云玉柱擎拈白石磷一團和氣滿瓶生入塔天方地圓龍虎盤旋左之鐘鼓右之源泉來脈響應紫霧垂簾宴坐于斯省念常參以拂子打圓相云優曇時時燦芻草日日鮮偈頌行住坐臥山中行踏著嶺頭片石新不用琢離成法器空王殿上獨稱尊山中住黃葉飄飄滿庭戶頑童拾得當金錢賽過他家敵國富山中坐獼猴持果菴前過擬將奪取讓小廝三二卻原是一箇山中臥月影憑闌光正大衲被蒙頭聽漏催任他花雨遍空播萬法歸一象王動步絶狐迹獅子迷蹤遠聖階箇裡全拋金鎖夢眉毛挂劍笑盈腮一歸何處滿空花雨點蒼苔不用移來不用裁到處逢人香引袖拋籃奪取隱天臺青州布衫青青白白不相粘不著蓑衣不覺寒日用慣吞無底鉢掃雲拂日大光天山居雲晴古徑筍莖低象舞龍盤蹤迹奇木石點頭含祖意松杉拱手接賢知霜凝雪凍晨鐘早雨灑煙籠暮鼓遲中隱幽人疊膝坐不言不語不添衣又溪橫緑水湧銀沙淡蕩清虛映月華兩岸蘆花飛素練一天星斗煥金蛇三賢有意開心蕊十聖無情鼓智槎謾謂吾儕慵問道相逢一盞趙州茶慶忠祖塔十首卓豎凌霄勢接天黃花翠竹自相聯巍峨鞏固乾坤老一點靈光徹性淵覿面崔嵬湧翠微玲瓏無縫有誰窺屏山字水堪陳供紅日當陽萬象輝白石磷磷勢向東煙霞示現紫金容杖頭吐出無生話芻草聯芳映碧空從空湧出鎮娑婆不染松煙不挂蘿麟鳳來棲龍象舞蒼苔石壁洵謳歌性天獨露一峰間劫石團圓翠若蘭五蘊內空含萬象光搖碧漢徹三天傑出靈苗豎未央獅窩象窟示當陽心空誓度娑婆苦淡月疏星意更長撥開雲霧見天梯面向南山背觸西不是冤家不聚首遍栽緑竹鳳來儀光浮紫氣散天花窣堵流暉弄景霞無底籃中多舍利白雲堆裡是誰家雨露滋培野鶴棲頂天立地碧中虛有人問道西來意水滿前江月滿溪層巒級級勢沖霄露不濕兮風不搖獅子聲驚裂獸腦象王踏處狐蹤消源流頌第一世南嶽懷讓禪師為法忘軀特地來退參修證是誰裁絶點離塵無一物剩得春風織錦回第二世馬祖道一禪師鏡破痕消別有天何勞磨拂惹塵煙一朝心佛齊拋卻月在當空水在淵第三世百丈懷海禪師江漢茫茫浪鼓天鴨鳧展翅獲歸源雲程遠大忘邊表吐舌耳聾屬浪傳第四世黃檗希運禪師一鉢千家度緣詎知婆子快施錢原來不惜家中寶少雨多風孔酸第五世臨濟義玄禪師一度遭傷一快哉腥風毒霧惱人懷三拳一掌輕相效始悔從前錯弄乖第六世興化存獎禪師一株大樹蔭三枝在在花開絶向違一喝如雷驚惺後贓私依舊落河西第七世南院慧顒禪師慣戰將軍不著鎧狼煙倏化祥雲靄真龍應現孰當頭浪滾濤翻齊赴海第八世風穴延沼禪師不計春秋忘歲月杖林山下覓根源等間得遘傲霜侶月皎心空體自妍第九世首山省念禪師一回舉處一回新拈弄無關任縱橫滿腹含冤難説出知恩卻是報恩人第十世太子院善昭禪師放則舒兮捲則歸一輪映現千江洄從教撲碎菱花面大地山河盡發輝第十一世慈明楚圓禪師當陽巨鑑甚光華己事欲明算海沙掩口辭窮齒舌冷滿腔毒氣逗龍蛇第十二世楊岐方會禪師幾番曲折實堪嗟窄路相逢眼著沙一擊卒然驚惺也風光無限屬誰家第十三世白雲守端禪師明珠一顆用無端幾度破兮幾度圓輸彼一籌贏百著藏刀笑裡血痕鮮第十四世五祖法演禪師不是佛兮不是心木人騎馬過深村禍門擊破乾坤闊大地山河總是春第十五世圓悟佛果禪師衣裡潛珠不外尋沒絃琴上合知音自從得透聲響也笑殺靈山不動尊第十六世大慧宗杲禪師涼生殿閣迓熏風有句無言盡屬空葉落枝枯渾不著象王動步絶狐蹤第十七世懶菴鼎需禪師學佛挂冠禮別峰優曇換卻杏花紅一朝懶唱無生調笑月吟風日鎮空第十八世本菴安永禪師有無言句動疑猜檢點由來自弄乖一喝倏然肝膽碎全身放下頂門開第十九世淨慈慧翁悟明禪師驅雲逐電涉山川猛虎當頭孰敢前施設門庭推老將茶瓶接嘴話應圓第二十世苦口良益禪師一波才動萬波隨瑞色常光在在輝水滿西湖秋月現全提正令顯鋒威第二十一世筏度普慈禪師每向村郊訪故人五臺山畔草青青芒鞋唱價錢酬足話到投機語倍親第二十二世言道顯禪師竹篦當頭解垢衣就中只許故人知從今撲碎天𩕳蓋報德酬恩不自欺第二十三世小菴行密禪師無聖無靈禮拜誰應聲覿面兩相灰倏聞忽聽絶音響是是非非總一歸第二十四世二仰圓欽禪師利鈍原同一舍居監收嚴密庫中虛忽觀鼠撲油瓶破慎莫逢人露一絲第二十五世無念智有禪師翹日陽和到處春四維上下絶疏親一朝把手談心訣平地遺殃禍不勝第二十六世荊山懷寶禪師月影雲飛映碧窗腳跟踏遍故家鄉自從合節投機後歸隱南山體用彰第二十七世鐵牛德遠禪師鋤草存苗意若何幾番雨露秀增多等間卸卻英雄奮獅子蹤迷唱凱歌第二十八世朝陽月明聯池禪師一輪明月在當天失腳拋頭豈偶然覷透歸根葉落旨耳聲眼色總無關第二十九世聚雲吹萬廣真禪師沒絃琴上覓知音一句分明句句真滿袖香風齊現出高提祖印耀乾坤第三十世治平鐵壁慧機禪師幾經鍛煉意捐軀骨碎渾身事事無眼藏心宗隨賣弄夜市街頭無價珠第三十一世振宗竺峰幻敏禪師閃電之機豈等間雙麟共駕無底船珠光放出豈多讓銅鐵收來不二看火裡波瀾標月指腳頭風快徹雲天乘流舞棹臨江渚字水屏山永厥傳秀慶訓慧福相滿賢琳捐資門人明徒孫真玄孫如玉同刊覺宣明微祥燦明性乾
